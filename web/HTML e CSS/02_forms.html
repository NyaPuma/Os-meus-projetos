<!DOCTYPE html>
<html lang="pt-Pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulários em html</h1>
    <br>
    <form action="">
        <table border="1">
            <tr>
                <td>Type</td>
                <td>Exemplo</td>
            </tr>
            <tr>
                <td>text</td>
                <td>nome: <input type="text" name="nome"></td>
            </tr>
            <tr>
                <td>button</td>
                <td><input type="submit"></td>
            </tr>
            <tr>
                <td>password</td>
                <td>password: <input type="password" name="password"></td>
            </tr>
            <tr>
                <td>date</td>
                <td>date: <input type="date" name="date"></td>
            </tr>
            <tr>
                <td>number</td>
                <td>number: <input type="number" name="number"></td>
            </tr>
            <tr>
                <td>month</td>
                <td>month: <input type="month" name="month"></td>
            </tr>
            <tr>
                <td>color</td>
                <td>color: <input type="color" name="color"></td>
            </tr>
            <tr>
                <td>checkbox</td>
                <td><input type="checkbox" name="checkbox"> Aceitar termos</td>
            </tr>
                        <tr>
                <td>Radio</td>
                <td><input type="radio" name="sexo" value="masculino"> Masculino<input type="radio" name="sexo" value="femenino"> Femenino</td>
            </tr>
            <tr>
                <td>file</td>
                <td>file: <input type="file" name="file"></td>
            </tr>
            <tr>
                <td>image</td>
                <td>image: <input type="image" name="image" src="imagens/logoo_ico.svg" alt="Image"></td>
            </tr>
            <tr>
                <td>range</td>
                <td>range: <input type="range" name="range"></td>
            </tr>
        </table>
    </form>
</body>
</html>
