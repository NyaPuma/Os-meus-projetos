<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Introduzir números até o utilizador introduzir o 100

        let numero = 0
        let contador = 0

        while (numero != 100){
            numero = parseInt(prompt("Introduza um número:"))
            contador = contador + 1
        }

        document.write("Deixei de pedir número porque introduziu o 100. Introduziu " + contador + " números")
    </script>
</body>
</html>
