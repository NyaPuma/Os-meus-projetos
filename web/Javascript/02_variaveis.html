<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Variáveis</h1>

    <!-- Exemplo javascript variáveis -->
    <script>
        // Pedir ao utilizador números em string (prompt) e converte-los em número(Number)
        // Number é necessário pois caso contrario js concatena em vez de somar
        let numero1 = Number(prompt("Digite o primeiro número:"))
        let numero2 = Number(prompt("Digite o segundo número:"))

        // Soma os dois números
        let soma = numero1 + numero2

        // Mostra ao utilizador um pop-up com o valor da soma
        alert ("A soma dos dois números é " + soma)

    </script>
</body>
</html>
