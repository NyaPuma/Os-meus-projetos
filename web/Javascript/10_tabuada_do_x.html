<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let x = 0
    x = parseInt(prompt("Insire o número do qual pretende fazer a tabuada?"))

        for(contador = 1; contador <= 10; contador++){
        tabuada = x * contador
        document.write(x + " x " + contador + " = " + tabuada + "<br>")
        }
    </script>
</body>
</html>
