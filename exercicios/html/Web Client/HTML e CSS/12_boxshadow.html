<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80% Shadow</title>
    <style>
        h1 {
            font-family: sans-serif;
            font-size: 50px;
            text-align: center;
            text-shadow: -5px 2px red, 5px 2px yellow, 5px -3px brown;
        }

        .Formatar {
            background-color: orange;
            width: 200px;
            height: 200px;
            margin: 10px;
            padding: 20px;
            box-shadow: 10px 10px 5px blue, -10px -15px red;
            border-radius: 10px 20px 30px 40px;
        }
    </style>
</head>
<body>
    <h1>80% Shadow</h1>

    <div class="Formatar">Conteúdo da div</div>
</body>
</html>
