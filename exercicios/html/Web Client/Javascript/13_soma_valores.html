<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Somar números até a soma desses números atingir 1000

        let soma = 0
        let numero = 0

        while(soma <= 1000){
            numero = parseInt(prompt("Digite um número para ser somado ao total:"))
            soma = soma + numero
        }

        document.write("Ultrapassaste ou atingistes o número 1000. A soma dos valores que introduziu foi " + soma)
    </script>
</body>
</html>
