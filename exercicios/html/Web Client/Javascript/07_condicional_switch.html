<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let diaSemana = prompt("Digite o dia da semana entre 1 e 7:")

        switch(diaSemana){

            case "1":
                alert("Domingo")
                break

            case "2":
                alert("Segunda")
                break

            case "3":
                alert("Terça")
                break

            case "4":
                alert("Quarta")
                break

            case "5":
                alert("Quinta")
                break

            case "6":
                alert("Sexta")
                break

            case "7":
                alert("Sábado")
                break
                
            default:
                alert("Dia da semana inválido")
        }
    </script>
</body>
</html>
