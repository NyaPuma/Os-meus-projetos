<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Pede um número ao utlizador
        let numero = prompt("Escreva um número")

        // Mostra número na consola, tenta converter com um parse para Number, Int e Float
        // Aparece 3 vezes, primeiro como Number, noutra linha como Int, e finalmente noutra linha como Float
        console.log(Number(numero))
        console.log(parseInt(numero))
        console.log(parseFloat(numero))
    </script>
</body>
</html>
