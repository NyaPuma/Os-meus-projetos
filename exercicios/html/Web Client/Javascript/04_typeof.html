<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de variáveis</title>
</head>
<body>
    <h1>Tipos de variáveis</h1>

    <script>
    // Comando de consola para verificar o tipo
    // console.log -> // Resultado na consola
    console.log(typeof 0) // number
    console.log(typeof "0") // string
    console.log(typeof String(0)) //string

    let selecionado = true
    console.log(typeof selecionado) // boolean
    console.log("Variaveis booleano") // Variaveis booleano
    console.log(Boolean (0)) // false
    console.log(Boolean("0")) // true
    </script>
</body>
</html>
